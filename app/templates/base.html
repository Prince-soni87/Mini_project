<!DOCTYPE html>
<html>

<head>
    <title>AI Pricing Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
</head>

<body style="background:#f5f7fb">
    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container-fluid"><span class="navbar-brand fw-bold">
                AI Pricing Intelligence
            </span>
            <div>{% if current_user.is_authenticated %}

                <span class="text-white me-3">
                    Hi, {{current_user.username}}
                </span><a href="/auth/logout" class="btn btn-danger btn-sm">
                    Logout
                </a>{% else %}

                <a href="/auth/login" class="btn btn-outline-light btn-sm">
                    Login
                </a><a href="/auth/register" class="btn btn-primary btn-sm">
                    Register
                </a>{% endif %}

            </div>
        </div>
    </nav>
    <div class="container mt-4">{% block content %}

        {% endblock %}

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
